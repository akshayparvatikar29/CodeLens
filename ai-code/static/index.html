<!DOCTYPE html>
<html>
<head>
<title>CodeLens</title>

<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<style>
body {
  font-family: "Segoe UI", Arial;
  margin:0;
  background:#f5f7fb;
}

.container {
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  background:#ffffff;
  padding:20px;
  border-right:1px solid #e5e7eb;
}

.sidebar h2 {
  margin-bottom:10px;
}

input {
  width:100%;
  padding:10px;
  margin-top:10px;
  margin-bottom:10px;
  border:1px solid #ccc;
  border-radius:6px;
}

button {
  width:100%;
  padding:10px;
  background:#2f6fed;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

button:hover {
  background:#1d4ed8;
}

/* MAIN */
.main {
  flex:1;
  padding:30px;
}

/* DASHBOARD CARDS */
.cards {
  display:flex;
  gap:20px;
  margin-top:20px;
}

.card {
  flex:1;
  padding:20px;
  border-radius:12px;
  font-weight:bold;
  font-size:16px;
}

.files { background:#dbeafe; }
.modules { background:#dcfce7; }
.complexity { background:#fef3c7; }

/* SUMMARY */
.summary {
  margin-top:20px;
  background:#2f6fed;
  color:white;
  padding:20px;
  border-radius:12px;
  line-height:1.6;
}
/* GRAPH */
.graph {
  margin-top:20px;
  background:white;
  padding:20px;
  border-radius:12px;
}

#network {
  height:250px;
}

/* FILE CARDS */
.file-card {
  background:white;
  padding:18px;
  margin-top:15px;
  border-radius:12px;
  line-height:1.6;
}

.file-card h4 {
  margin-bottom:10px;
}

/* CHAT */
.chat-box {
  margin-top:25px;
  background:white;
  padding:20px;
  border-radius:12px;
}

textarea {
  width:100%;
  height:80px;
  margin-top:10px;
  margin-bottom:10px;
  padding:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🔍 CodeLens</h2>

  <input id="repo-url" placeholder="Enter GitHub URL"/>
  <button onclick="analyzeRepo()">Analyze Repository</button>

  <h3 style="margin-top:20px;">Files</h3>
  <div id="file-list"></div>
</div>

<!-- MAIN -->
<div class="main">

<h1>AI Code Intelligence Dashboard</h1>

<!-- DASHBOARD -->
<div class="cards">
  <div class="card files">Files: <span id="file-count">-</span></div>
  <div class="card modules">Modules: <span id="module-count">-</span></div>
  <div class="card complexity">Complexity: <span id="complexity">-</span></div>
</div>

<!-- SUMMARY -->
<div id="repo-summary" class="summary"></div>

<!-- GRAPH -->
<div class="graph">
  <h3>Architecture Graph</h3>
  <div id="network"></div>
</div>

<!-- FILE DETAILS -->
<div id="file-explanations"></div>

<!-- CHAT -->
<div class="chat-box">
  <h3>💬 Ask AI about this repo</h3>
  <textarea id="question" placeholder="Ask something..."></textarea>
  <button onclick="askAI()">Ask</button>
  <div id="answer" style="margin-top:10px;"></div>
</div>

</div>
</div>
<script>

let globalData = null;

function cleanName(path) {
  return path.replace("repo_clone/", "");
}

function cleanText(text) {
  return text.replace(/\*\*/g, "");  // remove **
}

async function analyzeRepo() {
  const repoUrl = document.getElementById("repo-url").value;

  const res = await fetch("/analyze", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ repo_url: repoUrl })
  });

  const data = await res.json();
  globalData = data;

  // SUMMARY
  document.getElementById("repo-summary").innerText = data.repo_summary;

  // FILE LIST
  const fileList = document.getElementById("file-list");
  fileList.innerHTML = "";
  data.files.forEach(f => {
    const div = document.createElement("div");
    div.innerText = cleanName(f.file);
    fileList.appendChild(div);
  });

  // DASHBOARD
  document.getElementById("file-count").innerText = data.files.length;
  document.getElementById("module-count").innerText = data.files.length;
  document.getElementById("complexity").innerText = "LOW";

  // FILE DETAILS
  const container = document.getElementById("file-explanations");
  container.innerHTML = "";

  data.files.forEach(f => {

    const lines = cleanText(f.explanation)
      .split("\n")
      .filter(l => l.trim().startsWith("-"));

    const bullets = lines.map(l => `<li>${l.replace("-", "").trim()}</li>`).join("");

    const card = document.createElement("div");
    card.className = "file-card";

    card.innerHTML = `
      <h4>${cleanName(f.file)}</h4>
      <ul>${bullets}</ul>
    `;

    container.appendChild(card);
  });

  // GRAPH
  const nodes = [];
  const edges = [];

  data.files.forEach((f, i) => {
    nodes.push({ id:i, label: cleanName(f.file) });
    if(i>0) edges.push({ from:i-1, to:i });
  });

  const containerGraph = document.getElementById("network");

  const graphData = {
    nodes: new vis.DataSet(nodes),
    edges: new vis.DataSet(edges)
  };

  const options = {
    physics:false,   // ❌ disable zoom movement
    interaction:{ zoomView:false },  // ❌ disable zoom
    nodes:{
      size:14
    }
  };


  new vis.Network(containerGraph, graphData, options);
}


// ASK AI
async function askAI() {
  const q = document.getElementById("question").value;

  const res = await fetch("/ask", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      question:q,
      context:globalData
    })
  });

  const data = await res.json();

  document.getElementById("answer").innerText = data.answer;
}

</script>

</body>
</html>
