<!DOCTYPE html>
<html>
<head>
<title>CodeLens</title>

<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<style>
body {
  font-family: "Segoe UI", Arial;
  margin:0;
  background:#f5f7fb;
}

.container {
  display:flex;
}

.sidebar {
  width:260px;
  background:#ffffff;
  padding:20px;
  border-right:1px solid #e5e7eb;
}

.main {
  flex:1;
  padding:30px;
}

h1 {
  margin-bottom:10px;
}

/* INPUT SECTION */
.input-box {
  display:flex;
  gap:10px;
  margin-top:10px;
}

.input-box input {
  flex:1;
  padding:10px;
  border:1px solid #ccc;
  border-radius:8px;
}

.input-box button {
  background:#2563eb;
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
}

.input-box button:hover {
  background:#1d4ed8;
}

/* CARDS */
.cards {
  display:flex;
  gap:20px;
  margin-top:20px;
}

.card {
  flex:1;
  padding:20px;
  border-radius:12px;
  font-weight:bold;
}

.files { background:#dbeafe; }
.modules { background:#dcfce7; }
.complexity { background:#fef3c7; }

/* SUMMARY */
.summary {
  margin-top:20px;
  background:#2563eb;
  color:white;
  padding:20px;
  border-radius:12px;
  font-size:15px;
}

/* GRAPH */
.graph {
  margin-top:25px;
  background:white;
  padding:20px;
  border-radius:12px;
}

/* FILE CARDS */
.file-card {
  background:white;
  padding:20px;
  margin-top:15px;
  border-radius:12px;
  line-height:1.6;
}

.file-card h4 {
  margin-bottom:10px;
}

/* BULLETS */
.file-card ul {
  padding-left:20px;
}

.file-card li {
  margin-bottom:6px;
}

/* CHAT */
.chat-box {
  margin-top:30px;
  background:white;
  padding:20px;
  border-radius:12px;
}

.chat-box textarea {
  width:100%;
  height:80px;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.chat-box button {
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  background:#16a34a;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.chat-box button:hover {
  background:#15803d;
}
</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🔍 CodeLens</h2>

  <div class="input-box">
    <input id="repo-url" placeholder="Enter GitHub URL"/>
    <button onclick="analyzeRepo()">Analyze</button>
  </div>

  <h3 style="margin-top:20px;">Files</h3>
  <div id="file-list"></div>
</div>

<!-- MAIN -->
<div class="main">

<h1>AI Code Intelligence Dashboard</h1>

<div class="cards">
  <div class="card files">Files: <span id="file-count">-</span></div>
  <div class="card modules">Modules: <span id="module-count">-</span></div>
  <div class="card complexity">Complexity: <span id="complexity">-</span></div>
</div>

<div id="repo-summary" class="summary"></div>

<!-- GRAPH -->
<div class="graph">
  <h3>Architecture Graph</h3>
  <div style="display:flex; gap:20px;">
    <div id="network" style="flex:2; height:300px;"></div>
    <div id="relations" style="flex:1; font-size:14px;"></div>
  </div>
</div>

<div id="file-explanations"></div>

<!-- CHAT -->
<div class="chat-box">
  <h3>💬 Ask AI about this repo</h3>
  <textarea id="question" placeholder="Ask anything about this codebase..."></textarea>
  <button onclick="askAI()">Ask AI</button>
  <div id="answer" style="margin-top:10px;"></div>
</div>

</div>
</div>

<script>

function cleanName(path) {
  return path.replace("repo_clone/", "");
}

// 🔥 FORMAT FILE OUTPUT CLEANLY
function formatExplanation(text) {
  text = text.replace(/\*\*/g, ""); // remove **

  const lines = text.split("\n").filter(l => l.trim() !== "");

  let html = "<ul>";

  lines.forEach(line => {
    html += `<li>${line.replace("-", "").trim()}</li>`;
  });

  html += "</ul>";

  return html;
}

async function analyzeRepo() {
  const repoUrl = document.getElementById("repo-url").value;

  const res = await fetch("/analyze", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ repo_url: repoUrl })
  });

  const data = await res.json();

  document.getElementById("repo-summary").innerText = data.repo_summary;

  document.getElementById("file-count").innerText = data.files.length;
  document.getElementById("module-count").innerText = data.files.length;
  document.getElementById("complexity").innerText = "LOW";

  // FILE LIST
  const fileList = document.getElementById("file-list");
  fileList.innerHTML = "";

  data.files.forEach(f => {
    const div = document.createElement("div");
    div.innerText = cleanName(f.file);
    fileList.appendChild(div);
  });

  // FILE EXPLANATIONS (FIXED FORMAT)
  const container = document.getElementById("file-explanations");
  container.innerHTML = "";

  data.files.forEach(f => {
    const card = document.createElement("div");
    card.className = "file-card";

    card.innerHTML = `
      <h4>${cleanName(f.file)}</h4>
      ${formatExplanation(f.explanation)}
    `;

    container.appendChild(card);
  });

  // GRAPH (IMPROVED LOOK)
  const nodes = [];
  const edges = [];

  data.files.forEach((f, i) => {
    nodes.push({
      id:i,
      label: cleanName(f.file),
      shape:"dot",
      size:20,
      color:"#3b82f6",
      font:{ color:"#000", size:14 }
    });

    if(i>0) edges.push({
      from:i-1,
      to:i,
      color:"#94a3b8",
      smooth:true
    });
  });

  new vis.Network(
    document.getElementById("network"),
    { nodes, edges },
    {
      physics:{
        stabilization:true,
        barnesHut:{ gravitationalConstant:-2000 }
      },
      interaction:{
        zoomView:false  // ❌ removed zoom
      }
    }
  );

  // RELATIONS
  let relHTML = "";
  for(let i=0;i<data.files.length-1;i++){
    relHTML += `<div>${cleanName(data.files[i].file)} → ${cleanName(data.files[i+1].file)}</div>`;
  }

  document.getElementById("relations").innerHTML = relHTML;
}

// CHAT
async function askAI() {
  const q = document.getElementById("question").value;

  const res = await fetch("/chat", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ question: q })
  });

  const data = await res.json();

  document.getElementById("answer").innerText = data.answer;
}

</script>

</body>
</html>
