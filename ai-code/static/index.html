<!DOCTYPE html>
<html>
<head>
<title>CodeLens</title>

<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<style>
body {
  font-family: "Segoe UI", Arial;
  margin:0;
  background:linear-gradient(135deg,#eef2ff,#f8fafc);
}

/* HEADER */
.header {
  background:linear-gradient(90deg,#2563eb,#4f46e5);
  color:white;
  padding:18px 30px;
  font-size:22px;
  font-weight:bold;
}


.container {
  display:flex;
}


.sidebar {
  width:280px;
  background:#ffffff;
  padding:20px;
  border-right:1px solid #e5e7eb;
}

.section-title {
  font-size:14px;
  font-weight:bold;
  margin-top:20px;
  margin-bottom:8px;
  color:#6b7280;
}


.input-box {
  display:flex;
  gap:10px;
}

.input-box input {
  flex:1;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

.input-box button {
  background:#2563eb;
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
}


.stat-box {
  display:flex;
  justify-content:space-between;
  background:#f1f5f9;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  font-size:14px;
}


.file-item {
  padding:8px;
  border-radius:8px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:8px;
}

.file-item:hover {
  background:#eef2ff;
}

.file-icon {
  color:#2563eb;
}


.suggestion {
  background:#ecfdf5;
  padding:8px;
  border-radius:8px;
  font-size:13px;
  margin-bottom:6px;
}


.main {
  flex:1;
  padding:30px;
}


.cards { display:flex; gap:20px; margin-top:20px; }
.card { flex:1; padding:20px; border-radius:14px; font-weight:bold; }
.files { background:#dbeafe; }
.modules { background:#dcfce7; }
.complexity { background:#fef3c7; }

.summary {
  margin-top:20px;
  background:linear-gradient(90deg,#2563eb,#4f46e5);
  color:white;
  padding:20px;
  border-radius:14px;
}

.graph {
  margin-top:25px;
  background:white;
  padding:20px;
  border-radius:14px;
}

.relation-card {
  background:#ffffff;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border-left:4px solid #3b82f6;
}

.file-card {
  background:white;
  padding:20px;
  margin-top:15px;
  border-radius:14px;
}

.file-card ul { padding-left:20px; }

.chat-box {
  margin-top:30px;
  background:white;
  padding:20px;
  border-radius:14px;
}

.chat-box textarea {
  width:100%;
  height:80px;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.chat-box button {
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  background:#16a34a;
  color:white;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">🚀 CodeLens</div>

<div class="container">


<div class="sidebar">

<h2>🔍 Analyze Repo</h2>

<div class="input-box">
  <input id="repo-url" placeholder="Paste GitHub URL"/>
  <button onclick="analyzeRepo()">Analyze</button>
</div>


<div class="section-title">📊 Quick Stats</div>
<div class="stat-box">Files <span id="file-count">-</span></div>
<div class="stat-box">Modules <span id="module-count">-</span></div>
<div class="stat-box">Complexity <span id="complexity">-</span></div>


<div class="section-title">📂 Files</div>
<div id="file-list"></div>


<div class="section-title">🧠 Smart Insights</div>
<div class="suggestion">Try asking: "What is entry point?"</div>
<div class="suggestion">Try: "Explain architecture"</div>
<div class="suggestion">Try: "What does auth.py do?"</div>

</div>


<div class="main">

<h1>AI Code Intelligence Dashboard</h1>

<div id="repo-summary" class="summary"></div>

<div class="graph">
  <h3>Architecture Graph</h3>
  <div style="display:flex; gap:20px;">
    <div id="network" style="flex:2; height:320px;"></div>
    <div style="flex:1;">
      <h4>📊 Relationship Insights</h4>
      <div id="relations"></div>
    </div>
  </div>
</div>

<div id="file-explanations"></div>

<div class="chat-box">
  <h3>💬 Ask AI</h3>
  <textarea id="question"></textarea>
  <button onclick="askAI()">Ask</button>
  <div id="answer"></div>
</div>

</div>
</div>

<script>

function cleanName(path) {
  return path.replace("repo_clone/", "");
}

function formatExplanation(text) {
  text = text.replace(/\*\*/g, "");
  const lines = text.split("\n").filter(l => l.trim() !== "");
  let html = "<ul>";
  lines.forEach(line => {
    html += `<li>${line.replace("-", "").trim()}</li>`;
  });
  html += "</ul>";
  return html;
}

async function analyzeRepo() {
  const repoUrl = document.getElementById("repo-url").value;

  const res = await fetch("/analyze", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ repo_url: repoUrl })
  });

  const data = await res.json();

  document.getElementById("repo-summary").innerText = data.repo_summary;

  document.getElementById("file-count").innerText = data.files.length;
  document.getElementById("module-count").innerText = data.files.length;
  document.getElementById("complexity").innerText = "LOW";

  const fileList = document.getElementById("file-list");
  fileList.innerHTML = "";

  data.files.forEach(f => {
    const div = document.createElement("div");
    div.className = "file-item";
    div.innerHTML = `<span class="file-icon">📄</span> ${cleanName(f.file)}`;
    fileList.appendChild(div);
  });

  const container = document.getElementById("file-explanations");
  container.innerHTML = "";

  data.files.forEach(f => {
    const card = document.createElement("div");
    card.className = "file-card";
    card.innerHTML = `<h4>${cleanName(f.file)}</h4>${formatExplanation(f.explanation)}`;
    container.appendChild(card);
  });

  const nodes = [];
  const edges = [];

  data.files.forEach((f, i) => {
    nodes.push({ id:i, label: cleanName(f.file) });
    if(i>0) edges.push({ from:i-1, to:i });
  });

  new vis.Network(
    document.getElementById("network"),
    { nodes, edges },
    { interaction:{ zoomView:false } }
  );

  let relHTML = "";
  for(let i=0;i<data.files.length-1;i++){
    const s = cleanName(data.files[i].file);
    const t = cleanName(data.files[i+1].file);
    relHTML += `<div class="relation-card"><b>${s} → ${t}</b></div>`;
  }

  document.getElementById("relations").innerHTML = relHTML;
}

async function askAI() {
  const q = document.getElementById("question").value;
  const res = await fetch("/chat", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ question: q })
  });
  const data = await res.json();
  document.getElementById("answer").innerText = data.answer;
}

</script>

</body>
</html>
